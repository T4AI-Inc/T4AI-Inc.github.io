<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>電子公告 | T4AI株式会社</title>
    
    <link rel="icon" href="assets/hp_logo1.jpg">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fcfaff; 
            --text-main: #2d3748;
            --text-muted: #718096;
            --border-color: #e9d8fd;
            --accent-purple: #805ad5;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 80% 20%, rgba(213, 63, 140, 0.02) 0%, transparent 50%),
                              radial-gradient(circle at 20% 80%, rgba(128, 90, 213, 0.03) 0%, transparent 50%);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            margin: 60px auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(128, 90, 213, 0.03);
        }

        h1 {
            font-size: 22px;
            font-weight: 500;
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            letter-spacing: 2px;
        }

        h2 {
            font-size: 16px;
            color: var(--text-muted);
            margin-top: 30px;
            margin-bottom: 15px;
            border-left: 4px solid var(--border-color);
            padding-left: 12px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 16px 10px;
            border-bottom: 1px dashed var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        a {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .pdf-icon {
            font-size: 11px;
            font-weight: 600;
            background: rgba(128, 90, 213, 0.08);
            padding: 4px 10px;
            border-radius: 4px;
            color: var(--accent-purple);
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        a:hover .pdf-icon {
            background: rgba(128, 90, 213, 0.15);
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 12px;
            color: var(--text-muted);
        }

        footer a {
            color: var(--text-muted);
            transition: color 0.2s ease;
        }

        footer a:hover {
            color: var(--accent-purple);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>電子公告</h1>
        
        <h2>決算公告</h2>

    </div>
